<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公路赛车小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #222;
            font-family: Arial, sans-serif;
        }

        .gameContainer {
            width: 400px;
            height: 600px;
            background: #333;
            position: relative;
            overflow: hidden;
            border: 5px solid #555;
        }

        .road {
            width: 100%;
            height: 200%;
            background: #666;
            position: absolute;
            background-image: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 60px,
                white 60px,
                white 80px
            );
            animation: roadMove 1s linear infinite;
        }

        @keyframes roadMove {
            0% { top: 0; }
            100% { top: -80px; }
        }

        .playerCar {
            width: 50px;
            height: 90px;
            background: #ff3c41;
            position: absolute;
            bottom: 80px;
            left: 175px;
            border-radius: 8px;
        }

        .enemyCar {
            width: 50px;
            height: 90px;
            background: #4287f5;
            position: absolute;
            border-radius: 8px;
        }

        .score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 22px;
            z-index: 100;
        }

        .gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            display: none;
            z-index: 200;
        }

        .gameOver h2 {
            margin-bottom: 15px;
            color: #ff3c41;
        }

        #restartBtn {
            padding: 10px 20px;
            background: #4287f5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            z-index: 300;
        }

        .startScreen h2 {
            margin-bottom: 15px;
        }

        #startBtn {
            padding: 12px 25px;
            background: #ff3c41;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="gameContainer">
    <div class="road"></div>
    <div class="playerCar"></div>
    <div class="score">得分：0</div>

    <div class="gameOver">
        <h2>游戏结束</h2>
        <p>最终得分：<span id="finalScore">0</span></p>
        <br>
        <button id="restartBtn">重新开始</button>
    </div>

    <div class="startScreen">
        <h2>公路赛车</h2>
        <p>← → 控制左右移动</p>
        <p>躲避蓝色车辆</p>
        <br>
        <button id="startBtn">开始游戏</button>
    </div>
</div>

<script>
    const gameContainer = document.querySelector('.gameContainer');
    const playerCar = document.querySelector('.playerCar');
    const road = document.querySelector('.road');
    const scoreText = document.querySelector('.score');
    const gameOverScreen = document.querySelector('.gameOver');
    const finalScoreText = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const startScreen = document.querySelector('.startScreen');

    let gameRunning = false;
    let score = 0;
    let playerX = 175;
    const speed = 8;
    let enemySpeed = 5;
    let enemyInterval;
    let gameLoop;

    // 左右控制
    document.addEventListener('keydown', (e) => {
        if(!gameRunning) return;
        if(e.key === 'ArrowLeft' && playerX > 20) {
            playerX -= speed;
        }
        if(e.key === 'ArrowRight' && playerX < 330) {
            playerX += speed;
        }
        playerCar.style.left = playerX + 'px';
    });

    // 创建敌人车辆
    function createEnemy() {
        if(!gameRunning) return;
        let enemy = document.createElement('div');
        enemy.classList.add('enemyCar');
        enemy.style.left = Math.random() * 330 + 20 + 'px';
        enemy.style.top = '-100px';
        gameContainer.appendChild(enemy);
    }

    // 移动敌人 & 碰撞检测
    function moveEnemies() {
        let enemies = document.querySelectorAll('.enemyCar');
        enemies.forEach(enemy => {
            let enemyY = parseFloat(enemy.style.top);
            enemy.style.top = enemyY + enemySpeed + 'px';

            // 碰撞检测
            let playerRect = playerCar.getBoundingClientRect();
            let enemyRect = enemy.getBoundingClientRect();
            
            if(
                playerRect.left < enemyRect.right &&
                playerRect.right > enemyRect.left &&
                playerRect.top < enemyRect.bottom &&
                playerRect.bottom > enemyRect.top
            ) {
                gameOver();
            }

            // 超出屏幕删除+加分
            if(enemyY > 600) {
                enemy.remove();
                score++;
                scoreText.textContent = `得分：${score}`;
            }
        });
    }

    // 游戏开始
    function startGame() {
        gameRunning = true;
        score = 0;
        scoreText.textContent = `得分：${score}`;
        playerX = 175;
        playerCar.style.left = playerX + 'px';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';

        // 清空所有敌人
        document.querySelectorAll('.enemyCar').forEach(e => e.remove());

        // 生成敌人
        enemyInterval = setInterval(createEnemy, 1200);

        // 主循环
        gameLoop = setInterval(moveEnemies, 20);
    }

    // 游戏结束
    function gameOver() {
        gameRunning = false;
        clearInterval(enemyInterval);
        clearInterval(gameLoop);
        finalScoreText.textContent = score;
        gameOverScreen.style.display = 'block';
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
</script>

</body>
</html>
